name: Auto Release on Version Bump

# Fires when BuildInfo.h or VERSION changes on main.
# VERSION is the single source of truth for the release version number.
# The workflow reads VERSION, patches BuildInfo.h so the compiled binary
# carries the correct version, then compiles, bundles, and publishes a
# GitHub release with the zip attached.

on:
  push:
    branches:
      - main
    paths:
      - BuildInfo.h
      - VERSION

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, package, and release
    runs-on: windows-latest

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout with full history (needed for changelog + tag checks)
      # ----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------------------------------------
      # 2. Read version from VERSION file (single source of truth).
      #    If VERSION is e.g. "2.0.0.84", parse into MAJOR/MINOR/MODIF/BUILD
      #    and patch BuildInfo.h so the compiled binary carries the right
      #    version strings.
      # ----------------------------------------------------------------
      - name: Read version and patch BuildInfo.h
        id: ver
        shell: bash
        run: |
          VERSION_STR=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file contains: ${VERSION_STR}"

          IFS='.' read -r MAJOR MINOR MODIF BUILD <<< "$VERSION_STR"

          if [[ -z "$MAJOR" || -z "$MINOR" || -z "$MODIF" || -z "$BUILD" ]]; then
            echo "ERROR: VERSION file '${VERSION_STR}' is not in MAJOR.MINOR.MODIF.BUILD format"
            exit 1
          fi

          TAG="v${MAJOR}.${MINOR}.${MODIF}.${BUILD}"
          NAME="DDOBuilder ${MAJOR}.${MINOR}.${MODIF}.${BUILD}"
          ZIP="DDOBuilder-${TAG}.zip"

          echo "tag=${TAG}"   >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP}"   >> "$GITHUB_OUTPUT"

          # Patch BuildInfo.h so the compiled .exe carries the correct version
          sed -i "s/\(#define BUILDINFO_VERSION_MAJOR\s*\)[0-9]*/\1${MAJOR}/" BuildInfo.h
          sed -i "s/\(#define BUILDINFO_VERSION_MINOR\s*\)[0-9]*/\1${MINOR}/" BuildInfo.h
          sed -i "s/\(#define BUILDINFO_VERSION_MODIF\s*\)[0-9]*/\1${MODIF}/" BuildInfo.h
          sed -i "s/\(#define BUILDINFO_VERSION_BUILD\s*\)[0-9]*/\1${BUILD}/" BuildInfo.h

          echo "Patched BuildInfo.h to ${TAG}"
          grep 'BUILDINFO_VERSION_' BuildInfo.h | grep -v BLDSTR | grep -v VV | grep -v '"'

      # ----------------------------------------------------------------
      # 3. Skip everything if this exact release already exists
      # ----------------------------------------------------------------
      - name: Check whether release already exists
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" \
              --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.ver.outputs.tag }} already exists — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No release for ${{ steps.ver.outputs.tag }} — proceeding."
          fi

      # ----------------------------------------------------------------
      # 4. Set up MSBuild
      # ----------------------------------------------------------------
      - name: Set up MSBuild
        if: steps.check.outputs.skip == 'false'
        uses: microsoft/setup-msbuild@v2

      # ----------------------------------------------------------------
      # 5. Compile Release|Win32
      #    The project targets PlatformToolset v142 (VS 2019), but the
      #    windows-latest runner only ships MFC for v143 (VS 2022).
      #    Overriding PlatformToolset=v143 on the command line lets us use
      #    the available MFC libraries without touching the project file.
      #    OutDir is $(SolutionDir)Output\ so the exe lands alongside the
      #    existing DataFiles/, Default.ini, Example Builds/, wget.exe.
      # ----------------------------------------------------------------
      - name: Build Release|Win32
        if: steps.check.outputs.skip == 'false'
        run: |
          msbuild DDOBuilder.sln `
            /p:Configuration=Release `
            /p:Platform=Win32 `
            /p:PlatformToolset=v143 `
            /m `
            /v:minimal `
            /nologo

      # ----------------------------------------------------------------
      # 6. Bundle runtime DLLs into Output\
      #    - msxml.dll  (project dependency, checked in under 3rdPartyLibraries)
      #    - MFC / CRT  (Visual C++ 2022 x86 redistributables)
      # ----------------------------------------------------------------
      - name: Bundle DLLs into Output
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          # Project-supplied DLL
          Copy-Item "3rdPartyLibraries\MicrosoftIncludes\msxml.dll" "Output\" -Force

          # Visual C++ x86 redist DLLs
          $vsBase = "C:\Program Files (x86)\Microsoft Visual Studio"
          $dlls   = @("mfc140.dll","msvcp140.dll","vcruntime140.dll","vcruntime140_1.dll")

          $redist = Get-ChildItem "$vsBase" -Recurse -Filter "mfc140.dll" `
                      -ErrorAction SilentlyContinue |
                    Where-Object { $_.FullName -match "x86" } |
                    Select-Object -First 1

          if ($redist) {
            $dir = $redist.DirectoryName
            Write-Host "Using redist from: $dir"
            foreach ($dll in $dlls) {
              $src = Join-Path $dir $dll
              if (Test-Path $src) {
                Copy-Item $src "Output\" -Force
                Write-Host "  Copied $dll"
              }
            }
          } else {
            Write-Host "VS redist path not found; falling back to SysWOW64"
            foreach ($dll in $dlls) {
              $src = "C:\Windows\SysWOW64\$dll"
              if (Test-Path $src) {
                Copy-Item $src "Output\" -Force
                Write-Host "  Copied $dll from SysWOW64"
              }
            }
          }

          Write-Host "`nOutput\ contents:"
          Get-ChildItem "Output\" | Select-Object Name, Length

      # ----------------------------------------------------------------
      # 7. Zip up the entire Output\ folder
      # ----------------------------------------------------------------
      - name: Create release zip
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          $zip = "${{ steps.ver.outputs.zip }}"
          Compress-Archive -Path "Output\*" -DestinationPath $zip -Force
          $size = (Get-Item $zip).Length / 1MB
          Write-Host "Created ${zip} ($([math]::Round($size,1)) MB)"

      # ----------------------------------------------------------------
      # 8. Build a changelog from the git log since the previous tag
      # ----------------------------------------------------------------
      - name: Build changelog
        if: steps.check.outputs.skip == 'false'
        shell: bash
        run: |
          NOTES="${RUNNER_TEMP}/release_notes.md"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -1)

          {
            echo "## What's changed"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | head -100
            else
              git log HEAD --pretty=format:"- %s" --no-merges | head -50
            fi
            echo ""
            echo "---"
            echo ""
            echo "## Installation"
            echo ""
            echo "1. Download and extract **${{ steps.ver.outputs.zip }}**"
            echo "2. Run **DDOBuilder.exe** from the extracted folder"
            echo "3. If Windows shows a missing DLL error, install the"
            echo "   [Visual C++ 2019 Redistributable (x86)](https://aka.ms/vs/16/release/vc_redist.x86.exe)"
          } > "$NOTES"

          echo "NOTES_FILE=${NOTES}" >> "$GITHUB_ENV"
          cat "$NOTES"

      # ----------------------------------------------------------------
      # 9. Create the GitHub release and upload the zip
      # ----------------------------------------------------------------
      - name: Create GitHub release
        if: steps.check.outputs.skip == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            "${{ steps.ver.outputs.zip }}" \
            --repo     "${{ github.repository }}" \
            --title    "${{ steps.ver.outputs.name }}" \
            --notes-file "$NOTES_FILE" \
            --target   main

          echo "Release ${{ steps.ver.outputs.tag }} published."
