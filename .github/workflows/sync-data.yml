name: Sync DDO data from upstream

# Runs daily and on manual trigger.
# When the upstream Maetrim/DDOBuilderV2 data files change, this commits
# the updated XML/item files to main, which then triggers the deploy workflow.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # allow manual run from GitHub UI

jobs:
  sync:
    name: Sync data files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout our repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Sparse checkout — only fetch Output/DataFiles, skipping images/binaries
      - name: Checkout DDOBuilderV2 (sparse)
        uses: actions/checkout@v4
        with:
          repository: Maetrim/DDOBuilderV2
          path: _upstream
          sparse-checkout: Output/DataFiles

      - name: Sync XML/item files (exclude image directories)
        run: |
          mkdir -p Output/DataFiles

          rsync -av \
            --delete \
            --exclude="*Images/" \
            --exclude="*Image/" \
            --exclude="Blank Trees/" \
            --include="*/" \
            --include="*.xml" \
            --include="*.item" \
            --exclude="*" \
            --prune-empty-dirs \
            _upstream/Output/DataFiles/ \
            Output/DataFiles/

          rm -rf _upstream

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Output/DataFiles/

          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi

          CHANGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
          git commit -m "Sync DDO data from Maetrim/DDOBuilderV2 (${CHANGED} files) [$(date -u +%Y-%m-%d)]"
          git push
